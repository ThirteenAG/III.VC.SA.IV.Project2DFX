[LodLights]
RenderLodLights = 1
MaxNumberOfLodLights = 25000
CoronaRadiusMultiplier = 1.0
SlightlyIncreaseRadiusWithDistance = 1
CoronaAlphaNearMinMult = 0.5            ; alpha multiplier for nearby coronas 
CoronaAlphaReachOneAt = 150.0           ; distance where alpha multiplier reaches 1.0
CoronaAlphaBoostStartAt = 150.0         ; start boosting after this
CoronaAlphaFarBoostMax = 4.0            ; max boost for distant coronas
CoronaFarClip = auto
MaxNumberOfDistantCars = 2000

[StaticShadows]
IncreasePedsCarsShadowsDrawDistance = 1
StaticShadowsIntensity = 2.0
StaticShadowsDrawDistance = 300.0
TrafficLightsShadowsIntensity = 0.2
TrafficLightsShadowsDrawDistance = 300.0

[SearchLights]
RenderSearchlightEffects = 1
RenderOnlyDuringFoggyWeather = 0
SearchlightEffectVisibilityFactor = 0.4

[FarClip]
FarClipMultiplier = 0.0                 ; 0.0 = dynamic, any other value = fixed multiplier (e.g. 5.0)
HeightFactor = 0.05
MinMultiplier = 2.0
MaxMultiplier = 4.0
TargetFPS = 60

[IDETweaker]
DrawDistance = 5.0                      ; Original maximum value is 1.8
MaxDrawDistanceForNormalObjects = 0.0   ; Original maximum value is 300

[Misc]
RandomExplosionEffects = 1
ReplaceSmokeTrailWithBulletTrail = 1
