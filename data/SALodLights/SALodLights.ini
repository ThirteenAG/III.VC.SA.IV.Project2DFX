[LodLights]
RenderLodLights = 1
MaxNumberOfLodLights = 25000
CoronaRadiusMultiplier = 0.5
SlightlyIncreaseRadiusWithDistance = 1
CoronaAlphaNearMinMult = 0.5             ; alpha multiplier for nearby coronas 
CoronaAlphaReachOneAt = 150.0            ; distance where alpha multiplier reaches 1.0
CoronaAlphaBoostStartAt = 150.0          ; start boosting after this
CoronaAlphaFarBoostMax = 4.0             ; max boost for distant coronas
CoronaFarClip = auto
MaxNumberOfDistantCars = 2000
DistantCarsRadiusMultiplier = 1.0

[StaticShadows]
StaticShadowsIntensity = 2.0
StaticShadowsDrawDistance = 200.0

[SearchLights]
RenderSearchlightEffects = 1
RenderOnlyDuringFoggyWeather = 0
SearchlightEffectVisibilityFactor = 0.4

[FarClip]
FarClipMultiplier = 0                    ; 0 = dynamic, any other value = fixed multiplier (e.g. 5.0)
HeightFactor = 0.05
MinMultiplier = 2.0
MaxMultiplier = 4.0
TargetFPS = 60
StaticSunSize = 20.0

[IDETweaker]
TimedObjectsDrawDistance = 0.0           ; All values below 10.0 will be used as a multiplier, otherwise as a draw distance.
LODObjectsDrawDistance = 1300.0
GenericObjectsDrawDistance = 300.0
AllNormalObjectsDrawDistance = 0.0
VegetationDrawDistance = 800.0
PreloadLODs = 1
